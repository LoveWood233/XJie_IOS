# PROD-05: CI/CD — GitHub Actions 自动构建 + 测试
name: Xjie CI

on:
  push:
    branches: [main]
    paths: ['Xjie/**']
  pull_request:
    branches: [main]
    paths: ['Xjie/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('Xjie/Xjie.xcodeproj/project.pbxproj') }}
          restore-keys: ${{ runner.os }}-deriveddata-

      - name: Build
        run: |
          xcodebuild build \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Test
        run: |
          xcodebuild test \
            -project Xjie/Xjie.xcodeproj \
            -scheme Xjie \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true
